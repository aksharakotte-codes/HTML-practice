<html>
   <head>
      <title> Form tags </title>
   </head>
   <body>
      <form name="registration" method ="post" action="./login.html">
	    <input type="text" name="firstname" id="firstname" placeholder="FIRST NAME">
		<input type="password" name="password" id="password" placeholder="PASSWORD">
		<input type="number" name="mobile" id="mobile" placeholder="MOBILE">
		<input type="file" >
		<input type="submit" name="submit" id="submit" value="SUBMIT">
		<button type="button" name="submit" id="submit">SUBMIT</button>
		
		<br>
		<label>Qualifiation</label><br>
		<input type="checkbox" name="SSC" id="SSC" value="SSC"><label>SSC</label><br>
		<input type="checkbox" name="Inter" id="Inter" value="INTER"><label>INTER</label><br>
		<input type="checkbox" name="Ug" id="Ug" value="UG"><label>UG</label><br>
		
		<label>Gender</label><br>
		<input type="radio" name="Gender" id="Female" value="Female"><label>Female</label><br>
		<input type="radio" name="Gender" id="Male" value="Male"><label>Male</label><br>
		<input type="radio" name="Gender" id="Trans" value="Trans"><label>Trans</label><br>
		
		<label>Preferred Location</label><br>
		<input type="radio" name="Location" id="HYD" value="Hyd"><label>HYD</label><br>
		<input type="radio" name="Location" id="Chennai" value="Chennai"><label>Chennai</label><br>
		<input type="radio" name="Location" id="Bengaluru" value="Bengaluru"><label>Bengaluru</label><br>
		
		<select name="Course" id="Course">
		   <option value="JAVA FULL STACK">Java full stack</option>
		   <option value="PYTHON FULL STACK">Python full stack</option>
		   <option value="DEVOPS">Devops</option>
		</select>   
   </body>
</html>
