<html>
   <head>
      <title> List tags </title>
   </head>
   <body>
      <h1> UnOrdered List </h1>
	    <ul>
            <li>Java</li>
            <li>Python</li>
            <li>C</li>
            <li>C++</li>
        </ul>
	<h1> Disc UnOrdered List </h1>
	    <ul style="list-style-type:disc;">
            <li>Java</li>
            <li>Python</li>
            <li>C</li>
            <li>C++</li>
        </ul>
	<h1>Circle UnOrdered List </h1>
	    <ul style="list-style-type:circle;">
            <li>Java</li>
            <li>Python</li>
            <li>C</li>
            <li>C++</li>
        </ul>
	<h1>Square UnOrdered List </h1>
	    <ul style="list-style-type:square;">
            <li>Java</li>
            <li>Python</li>
            <li>C</li>
            <li>C++</li>
        </ul>
	<h1>None UnOrdered List </h1>
	    <ul style="list-style-type:none;">
            <li>Java</li>
            <li>Python</li>
            <li>C</li>
            <li>C++</li>
        </ul>
   </body>
</html>
