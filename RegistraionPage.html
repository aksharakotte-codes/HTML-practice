<html>
   <head>
      <title> Registration page </title>
   </head>
   <body>
      <h1>Student's Registration</h1>
      <form name="registration" method ="post" action="./RegistraionPageDone.html">
	    <label>First Name:</label><br>
	    <input type="text" name="firstname" id="firstname" placeh
		older="FIRST NAME"><br>
		
		<label>Last Name:</label><br>
		<input type="text" name="lastname" id="lastname" placeholder="LAST NAME"><br>
		
		<label>Age:</label><br>
		<input type="number" name="age" id="age" placeholder="AGE"><br>
		
		
		<label>Gender:</label><br>
		<input type="radio" name="Gender" id="Female" value="Female"><label>Female</label><br>
		<input type="radio" name="Gender" id="Male" value="Male"><label>Male</label><br>
		<input type="radio" name="Gender" id="Trans" value="Trans"><label>Trans</label><br>
		
		<label>Year Of Passing:</label><br>
		<input type="number" name="YOP" id="YOP" placeholder="YEAR OF PASSING"><br>
		
		<label>E-mail:</label><br>
		<input type="email" name="email" id="email" placeholder="Email"><br>
		
		<label>Mobile No:</label><br>
		<input type="number" name="mobile" id="mobile" placeholder="MOBILE"><br> 
		
		<label>Password:</label><br>
		<input type="password" name="password" id="password" placeholder="PASSWORD"><br>
		
		<label>Confirm Password:</label><br>
		<input type="password" name="confirm password" id="confirm password" placeholder="PASSWORD"><br>
		
		
		<input type="submit" name="submit" id="submit" value="SUBMIT"> 
       </form>
   </body>
</html>
