<html>
   <head>
      <title> Table tags </title>
   </head>
   <body>
        <table border="1">
           <caption>Student Report</caption>
    
            <tr>
              <th rowspan="2">Name</th>
              <th colspan="2">Marks</th>
            </tr>
            <tr>
              <th>Math</th>
              <th>Science</th>
            </tr>
            <tr>
              <td>John</td>
              <td>80</td>
              <td>75</td>
            </tr>
        </table>
   </body>
</html>
